<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⛩️ Shrine</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a1a;
      --bg2: #222222;
      --bg3: #2a2a2a;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.12);
      --text: rgba(255,255,255,0.88);
      --text2: rgba(255,255,255,0.5);
      --text3: rgba(255,255,255,0.25);
      --green: #3EB489;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 0.5px solid var(--border);
      background: var(--bg);
      position: relative;
      flex-shrink: 0;
      z-index: 10;
    }

    .shrine-logo {
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      user-select: none;
    }

    /* ── MODEL SELECT ── */
    .model-select-wrapper { position: relative; }

    .model-trigger {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border-radius: 10px;
      background: transparent;
      border: none;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text);
      transition: background 0.15s;
      user-select: none;
    }

    .model-trigger:hover { background: rgba(255,255,255,0.06); }


    .chevron {
      width: 13px; height: 13px;
      opacity: 0.4;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .model-trigger.open .chevron { transform: rotate(180deg); }

    .model-dropdown {
      position: absolute;
      top: calc(100% + 5px);
      left: 0;
      min-width: 230px;
      background: #242424;
      border: 0.5px solid var(--border2);
      border-radius: 13px;
      padding: 6px;
      z-index: 100;
      display: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }

    .model-dropdown.open { display: block; }

    .model-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .model-option:hover:not(.locked) { background: rgba(255,255,255,0.07); }
    .model-option.active { background: rgba(255,255,255,0.06); }
    .model-option.locked { opacity: 0.35; cursor: default; }

    .model-option-left { display: flex; flex-direction: column; gap: 2px; }

    .model-name {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text);
    }

    .model-sub {
      font-size: 10.5px;
      color: var(--text3);
      font-family: 'Sora', sans-serif;
    }

    .badge {
      font-size: 9.5px;
      font-weight: 500;
      padding: 3px 7px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: var(--text3);
      border: 0.5px solid var(--border);
    }

    .check {
      width: 14px; height: 14px;
      color: var(--green);
      flex-shrink: 0;
    }

    /* ── CONVO NAME ── */
    .convo-name {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text3);
    }

    /* ── MESSAGES ── */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px 12px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .msg-row {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 8px;
      max-width: 78%;
    }

    .msg-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg-row.ai {
      align-self: flex-start;
    }

    .msg-avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      margin-bottom: 1px;
    }

    .msg-row.user .msg-avatar { display: none; }

    .msg-bubble {
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.user .msg-bubble {
      background: var(--bg3);
      border: 0.5px solid var(--border);
      border-bottom-right-radius: 4px;
    }

    .msg-row.ai .msg-bubble {
      background: transparent;
      border: 0.5px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* typing indicator */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      border-radius: 14px;
      border-bottom-left-radius: 4px;
      border: 0.5px solid var(--border);
      background: transparent;
    }

    .typing-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--text3);
      animation: blink 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ── INPUT BAR ── */
    .input-bar {
      padding: 12px 16px 20px;
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .input-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      border: 0.5px solid var(--border2);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      padding: 10px 14px 10px 42px;
      min-height: 44px;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within { border-color: rgba(255,255,255,0.22); }

    .attach-btn {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px; height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text3);
      transition: color 0.15s;
      flex-shrink: 0;
      z-index: 2;
    }

    .attach-btn:hover { color: var(--text2); }

    /* ── PLUS MENU ── */
    .plus-menu-wrap {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
    }

    .plus-btn {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text3);
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .plus-btn:hover { color: var(--text2); border-color: rgba(255,255,255,0.28); }
    .plus-btn.active { color: var(--text); border-color: rgba(255,255,255,0.35); }

    .plus-menu {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0;
      width: 200px;
      background: #242424;
      border: 0.5px solid var(--border2);
      border-radius: 13px;
      padding: 5px;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    .plus-menu.open { display: block; }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 11px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text);
      user-select: none;
    }

    .menu-item:hover { background: rgba(255,255,255,0.07); }

    .menu-item-icon {
      width: 16px; height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text2);
      flex-shrink: 0;
    }

    .menu-divider {
      height: 0.5px;
      background: var(--border);
      margin: 4px 8px;
    }

    .menu-check {
      margin-left: auto;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.12s;
      flex-shrink: 0;
    }

    .menu-item.checked .menu-check { opacity: 1; }
    .menu-item.checked .menu-item-icon { color: var(--text); }

    #fileInput { display: none; }

    #msgInput {
      flex: 1;
      font-family: 'Sora', sans-serif;
      font-size: 13.5px;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      line-height: 1.55;
      max-height: 140px;
      overflow-y: auto;
    }

    #msgInput::placeholder { color: var(--text3); }
    #msgInput::-webkit-scrollbar { display: none; }

    .send-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      color: var(--text2);
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      align-self: flex-end;
    }

    .send-btn:hover {
      border-color: rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    /* attachment preview */
    .attachment-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0 16px 6px;
    }

    .attachment-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: rgba(255,255,255,0.06);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      font-size: 11.5px;
      color: var(--text2);
      font-family: 'DM Mono', monospace;
    }

    .chip-remove {
      cursor: pointer;
      color: var(--text3);
      font-size: 13px;
      line-height: 1;
      transition: color 0.12s;
    }

    .chip-remove:hover { color: var(--text); }

    /* empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding-bottom: 60px;
    }

    .empty-icon { font-size: 36px; opacity: 0.5; }

    .empty-text {
      font-size: 13px;
      color: var(--text3);
      font-weight: 400;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (typeof pdfjsLib !== 'undefined') {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
</head>
<body>



<div class="topbar">
  <!-- Model Selector -->
  <div class="model-select-wrapper">
    <div class="model-trigger" id="modelTrigger" onclick="toggleDropdown()">
      <span id="selectedModelLabel">GPT 5.4 Nano</span>
      <svg class="chevron" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 5l4 4 4-4"/>
      </svg>
    </div>
    <div class="model-dropdown" id="modelDropdown">
      <div class="model-option active" data-model="gpt-5.4-nano" onclick="selectModel(this)">
        <div class="model-option-left">
          <span class="model-name">GPT 5.4 Nano</span>
          <span class="model-sub">Fast · Efficient</span>
        </div>
        <svg class="check" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 7l3.5 3.5L12 3"/>
        </svg>
      </div>
      <div class="model-option" data-model="gpt-5.3" onclick="selectModel(this)">
        <div class="model-option-left">
          <span class="model-name">GPT 5.3 Instant</span>
          <span class="model-sub">Balanced · Versatile</span>
        </div>
        <svg class="check" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M2 7l3.5 3.5L12 3"/>
        </svg>
      </div>
      <div class="model-option" data-model="gpt-5.3" data-reasoning="high" onclick="selectModel(this)">
        <div class="model-option-left">
          <span class="model-name">GPT 5.3 Thinking</span>
          <span class="model-sub">Deep · Reasoning</span>
        </div>
        <svg class="check" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <path d="M2 7l3.5 3.5L12 3"/>
        </svg>
      </div>
    </div>
  </div>

  <span class="shrine-logo">⛩️ shrine</span>
  <span class="convo-name" id="convoName">New conversation</span>
</div>

<!-- Attachment preview strip -->
<div class="attachment-preview" id="attachmentPreview"></div>

<!-- Messages -->
<div class="messages-area" id="messagesArea">
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">⛩️</div>
    <div class="empty-text">What's on your mind?</div>
  </div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-wrap">
    <div class="plus-menu-wrap" id="plusMenuWrap">
      <div class="plus-btn" id="plusBtn" onclick="togglePlusMenu(event)">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M5.5 1v9M1 5.5h9"/>
        </svg>
      </div>
      <div class="plus-menu" id="plusMenu">
        <div class="menu-item" onclick="triggerFileInput()">
          <span class="menu-item-icon">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 7l-5.5 5.5a3.2 3.2 0 01-4.5-4.5l6-6a1.8 1.8 0 012.5 2.5L4.5 10a.5.5 0 01-.7-.7L9 4"/>
            </svg>
          </span>
          <span>Add files or photos</span>
        </div>
        <div class="menu-divider"></div>
        <div class="menu-item" id="webSearchToggle" onclick="toggleWebSearch()">
          <span class="menu-item-icon">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="7" cy="7" r="5.5"/>
              <path d="M7 1.5c-2 2-2 7 0 11M7 1.5c2 2 2 7 0 11M1.5 7h11"/>
            </svg>
          </span>
          <span>Web search</span>
          <span class="menu-check">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 6l2.8 2.8L10 3"/>
            </svg>
          </span>
        </div>
      </div>
    </div>
    <input type="file" id="fileInput" multiple accept=".txt,.md,.csv,.json,.pdf,.png,.jpg,.jpeg,.webp,.gif" onchange="handleFiles(this.files)"/>
    <textarea id="msgInput" rows="1" placeholder="message" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6.5 11V2M2 6.5l4.5-4.5 4.5 4.5"/>
    </svg>
  </button>
</div>

<script>
  // ── State ──
  let selectedModel = "gpt-5.4-nano";
  let selectedReasoningEffort = null;
  let webSearchEnabled = true;
  let conversation = []; // { role, content }
  let pendingFiles = [];
  let isLoading = false;
  let msgCount = 0;

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('webSearchToggle').classList.add('checked');
  });

  // ── Model dropdown ──
  function toggleDropdown() {
    document.getElementById('modelTrigger').classList.toggle('open');
    document.getElementById('modelDropdown').classList.toggle('open');
  }

  function selectModel(el) {
    if (el.classList.contains('locked')) return;
    document.querySelectorAll('.model-option').forEach(o => {
      o.classList.remove('active');
      const c = o.querySelector('.check');
      if (c) c.style.display = 'none';
    });
    el.classList.add('active');
    const check = el.querySelector('.check');
    if (check) check.style.display = '';
    selectedModel = el.dataset.model;
    selectedReasoningEffort = el.dataset.reasoning || null;
    const name = el.querySelector('.model-name').textContent;
    document.getElementById('selectedModelLabel').textContent = name;
    document.getElementById('modelTrigger').classList.remove('open');
    document.getElementById('modelDropdown').classList.remove('open');
  }

  // ── Plus menu ──
  function togglePlusMenu(e) {
    e.stopPropagation();
    const menu = document.getElementById('plusMenu');
    const btn  = document.getElementById('plusBtn');
    const isOpen = menu.classList.contains('open');
    menu.classList.toggle('open');
    btn.classList.toggle('active', !isOpen);
  }

  function triggerFileInput() {
    document.getElementById('plusMenu').classList.remove('open');
    document.getElementById('plusBtn').classList.remove('active');
    document.getElementById('fileInput').click();
  }

  function toggleWebSearch() {
    webSearchEnabled = !webSearchEnabled;
    const toggle = document.getElementById('webSearchToggle');
    toggle.classList.toggle('checked', webSearchEnabled);
  }

  document.addEventListener('click', e => {
    const wrap = document.getElementById('plusMenuWrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('plusMenu').classList.remove('open');
      document.getElementById('plusBtn').classList.remove('active');
    }
    // also close model dropdown
    const modelWrap = document.querySelector('.model-select-wrapper');
    if (!modelWrap.contains(e.target)) {
      document.getElementById('modelTrigger').classList.remove('open');
      document.getElementById('modelDropdown').classList.remove('open');
    }
  });

  // ── Textarea auto-resize ──
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── File handling ──
  const TEXT_TYPES = ['text/plain', 'text/markdown', 'text/csv', 'application/json', 'text/json'];
  const TEXT_EXTS  = ['.txt', '.md', '.csv', '.json'];

  function isTextFile(file) {
    return TEXT_TYPES.includes(file.type) || TEXT_EXTS.some(e => file.name.toLowerCase().endsWith(e));
  }

  function isImageFile(file) {
    return file.type.startsWith('image/');
  }

  function isPDF(file) {
    return file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  }

  function readAsText(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = () => rej(new Error('Failed to read file'));
      r.readAsText(file);
    });
  }

  function readAsDataURL(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = () => rej(new Error('Failed to read file'));
      r.readAsDataURL(file);
    });
  }

  async function extractPDFText(file) {
    if (typeof pdfjsLib === 'undefined') throw new Error('PDF.js not loaded');
    const dataUrl = await readAsDataURL(file);
    const base64 = dataUrl.split(',')[1];
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
    let fullText = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join(' ');
      fullText += `[Page ${i}]\n${pageText}\n\n`;
    }
    return fullText.trim();
  }

  async function handleFiles(files) {
    for (const file of Array.from(files)) {
      try {
        if (isImageFile(file)) {
          const dataUrl = await readAsDataURL(file);
          const base64 = dataUrl.split(',')[1];
          pendingFiles.push({ name: file.name, type: 'image', base64, mime: file.type });
        } else if (isPDF(file)) {
          const chip = addLoadingChip(file.name);
          try {
            const text = await extractPDFText(file);
            chip.remove();
            pendingFiles.push({ name: file.name, type: 'text', content: `[PDF: ${file.name}]\n\n${text}` });
          } catch (err) {
            chip.remove();
            pendingFiles.push({ name: file.name, type: 'text', content: `[PDF: ${file.name}] (Could not extract text — scanned or encrypted PDF)` });
          }
        } else if (isTextFile(file)) {
          const text = await readAsText(file);
          pendingFiles.push({ name: file.name, type: 'text', content: `[File: ${file.name}]\n\n${text}` });
        } else {
          pendingFiles.push({ name: file.name, type: 'unsupported', content: `[Unsupported file: ${file.name}]` });
        }
        renderAttachmentChips();
      } catch (err) {
        console.error('File error:', err);
      }
    }
    document.getElementById('fileInput').value = '';
  }

  function addLoadingChip(name) {
    const strip = document.getElementById('attachmentPreview');
    const chip = document.createElement('div');
    chip.className = 'attachment-chip';
    chip.innerHTML = `<span>Reading ${name}…</span>`;
    strip.appendChild(chip);
    return chip;
  }

  function renderAttachmentChips() {
    const strip = document.getElementById('attachmentPreview');
    strip.innerHTML = '';
    pendingFiles.forEach((f, i) => {
      const chip = document.createElement('div');
      chip.className = 'attachment-chip';
      chip.innerHTML = `
        <span>${f.name}</span>
        <span class="chip-remove" onclick="removeFile(${i})">×</span>
      `;
      strip.appendChild(chip);
    });
  }

  function removeFile(i) {
    pendingFiles.splice(i, 1);
    renderAttachmentChips();
  }

  // ── Render a message bubble ──
  function appendMessage(role, text) {
    const area = document.getElementById('messagesArea');
    const empty = document.getElementById('emptyState');
    if (empty) empty.remove();

    msgCount++;
    if (msgCount === 1) {
      const words = text.trim().split(' ').slice(0, 4).join(' ');
      document.getElementById('convoName').textContent = words + (text.split(' ').length > 4 ? '…' : '');
    }

    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    if (role === 'ai') {
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = '⛩️';
      row.appendChild(avatar);
    }

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = text;

    row.appendChild(bubble);
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
    return bubble;
  }

  // ── Typing indicator ──
  function showTyping() {
    const area = document.getElementById('messagesArea');
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'typingRow';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = '⛩️';

    const bubble = document.createElement('div');
    bubble.className = 'typing-bubble';
    bubble.innerHTML = `
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    `;

    row.appendChild(avatar);
    row.appendChild(bubble);
    area.appendChild(row);
    area.scrollTop = area.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  // ── Send ──
  async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text && pendingFiles.length === 0) return;

    // Build content for this turn
    let userContent;
    if (pendingFiles.length > 0) {
      userContent = [];
      if (text) userContent.push({ type: 'text', text });
      pendingFiles.forEach(f => {
        if (f.type === 'image') {
          userContent.push({
            type: 'image_url',
            image_url: { url: `data:${f.mime};base64,${f.base64}` }
          });
        } else {
          // text, pdf extracted text, unsupported label — all injected as text
          userContent.push({ type: 'text', text: f.content });
        }
      });
    } else {
      userContent = text;
    }

    appendMessage('user', text || `[${pendingFiles.map(f => f.name).join(', ')}]`);
    conversation.push({ role: 'user', content: userContent });
    pendingFiles = [];
    renderAttachmentChips();
    input.value = '';
    input.style.height = 'auto';

    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const res = await fetch('https://shrine-server-production.up.railway.app/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-shrine-key': 'shrine_xk92mzp4'
        },
        body: JSON.stringify({
          model: selectedModel,
          messages: conversation,
          webSearch: webSearchEnabled,
          reasoningEffort: selectedReasoningEffort
        })
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error?.message || `Error ${res.status}`);
      }

      // Responses API returns output array, Chat Completions returns choices
      let reply;
      if (data.output) {
        // Responses API format
        const msgBlock = data.output.find(b => b.type === 'message');
        reply = msgBlock?.content?.find(c => c.type === 'output_text')?.text || '(no response)';
        // Store in conversation as assistant message for next turn
        conversation.push({ role: 'assistant', content: reply });
      } else {
        // Chat Completions format
        reply = data.choices?.[0]?.message?.content || '(no response)';
        conversation.push({ role: 'assistant', content: reply });
      }

      removeTyping();
      appendMessage('ai', reply);

    } catch (err) {
      removeTyping();
      appendMessage('ai', `⚠️ ${err.message}`);
    } finally {
      isLoading = false;
      document.getElementById('sendBtn').disabled = false;
    }
  }
</script>
